version: '3.9'
services:

  backend:
    build: ./backend
    container_name: capstone_backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data:ro
      - ../experiments:/app/experiments:ro
      - ../llm_runner:/app/llm_runner:ro
      - ../baseline:/app/baseline:ro
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: capstone_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: capstone_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
