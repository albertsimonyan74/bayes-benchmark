services:
  - type: web
    name: capstone-llm-stats-api
    env: python
    rootDir: capstone-website/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      # For persistent vote storage across deploys — set up a free Supabase project:
      # SQL: CREATE TABLE votes (id BIGSERIAL PRIMARY KEY, data JSONB NOT NULL, created_at TIMESTAMPTZ DEFAULT NOW());
      #      CREATE TABLE questions (id BIGSERIAL PRIMARY KEY, data JSONB NOT NULL, created_at TIMESTAMPTZ DEFAULT NOW());
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Or: mount a Render Persistent Disk and set DATA_DIR to the mount path
      - key: DATA_DIR
        sync: false
